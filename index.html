<script>

function calcular(){

const cupo = parseFloat(document.getElementById('cupo').value);
const diaLibre = parseInt(document.getElementById('diaLibre').value);
const inicio = parseFecha(document.getElementById('fechaInicio').value);
const fin = parseFecha(document.getElementById('fechaFin').value);

if(!cupo || !diaLibre || !inicio || !fin) return;

const tbody = document.querySelector('#tabla tbody');
tbody.innerHTML = '';

let current = new Date(inicio.getFullYear(), inicio.getMonth(), 1);

while(current <= fin){

const inicioMesReal = new Date(current.getFullYear(), current.getMonth(), 1);
const finMesReal = new Date(current.getFullYear(), current.getMonth()+1, 0);

const mesInicio = new Date(Math.max(inicioMesReal, inicio));
const mesFin = new Date(Math.min(finMesReal, fin));

const diasLaboralesMes = contarDias(
inicioMesReal,
finMesReal,
diaLibre
);

const diasTrabajados = contarDias(
mesInicio,
mesFin,
diaLibre
);

const monto = (cupo / diasLaboralesMes) * diasTrabajados;

const row = `
<tr>
<td>${nombreMes(current)}</td>
<td>${formato(mesInicio)}</td>
<td>${formato(mesFin)}</td>
<td>${diasLaboralesMes}</td>
<td>${diasTrabajados}</td>
<td>$${monto.toFixed(2)}</td>
</tr>
`;

tbody.innerHTML += row;

current = new Date(current.getFullYear(), current.getMonth()+1, 1);
}

}

function contarDias(inicio, fin, diaLibre){

let count = 0;
let d = new Date(inicio);

while(d <= fin){

const day = d.getDay();

if(day !== 0 && day !== diaLibre){
count++;
}

d.setDate(d.getDate()+1);

}

return count;

}

function parseFecha(valor){

const partes = valor.split("-");
return new Date(partes[0], partes[1]-1, partes[2]);

}

function formato(fecha){

const dia = String(fecha.getDate()).padStart(2,'0');
const mes = String(fecha.getMonth()+1).padStart(2,'0');
const anio = fecha.getFullYear();

return `${dia}/${mes}/${anio}`;

}

function nombreMes(fecha){

return fecha.toLocaleString('es-ES', { month: 'long' });

}

</script>
